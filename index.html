<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#EEF1F6">
<title>FlashDeck — Repetição espaçada</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="assets/styles/tokens.css">
<link rel="stylesheet" href="assets/styles/app.css">
</head>
<body>
<div class="fd-topbar" id="topbar"></div>
<div class="fd-overlay" id="overlay" onclick="FD.closeDrawer()"></div>
<div class="fd-shell">
  <aside class="fd-drawer" id="drawer"></aside>
  <div class="fd-main"><div class="fd-wrap" id="app"></div></div>
</div>
<div id="toast-slot"></div>
<div id="modal-slot"></div>
<script type="module" src="src/main.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer onload="gisLoaded()"></script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () =>
    navigator.serviceWorker.register("service-worker.js").catch(() => {}));
}
</script>
</body>
</html>
